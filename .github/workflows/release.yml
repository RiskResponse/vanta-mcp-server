name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: mcp-vanta-server
        run: npm ci

      - name: Audit dependencies
        working-directory: mcp-vanta-server
        run: npm audit --omit=dev

      - name: Lint
        working-directory: mcp-vanta-server
        run: npm run lint

      - name: Type check
        working-directory: mcp-vanta-server
        run: npx tsc --noEmit

      - name: Build server
        working-directory: mcp-vanta-server
        run: npm run build

      - name: Unit tests
        if: matrix.node-version >= 20
        working-directory: mcp-vanta-server
        run: npm test

      - name: Upload build artifacts
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: mcp-vanta-server/dist/
          retention-days: 1

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: mcp-vanta-server/dist/

      - name: Create release artifact
        run: |
          mkdir -p release/vanta-mcp-server
          cp -r mcp-vanta-server/dist release/vanta-mcp-server/
          cp mcp-vanta-server/package.json release/vanta-mcp-server/
          cp mcp-vanta-server/package-lock.json release/vanta-mcp-server/
          cp mcp-vanta-server/mcp.json.template release/vanta-mcp-server/mcp.json
          cp mcp-vanta-server/setup.sh release/vanta-mcp-server/
          cp README.md release/vanta-mcp-server/
          cd release && zip -r ../vanta-mcp-server.zip vanta-mcp-server

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vanta-mcp-server
          path: vanta-mcp-server.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: vanta-mcp-server.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. Download `vanta-mcp-server.zip`
            2. Unzip to a location on your machine
            3. Run `npm install --production` inside the folder
            4. Configure your IDE (see README.md)
